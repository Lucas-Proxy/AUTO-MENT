<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALYST — NOC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        [data-theme="light"] {
            --bg: #eef2f7; --bg2: #fff; --bg3: #f5f8fc; --bg4: #e8f0fd;
            --blue: #1a6fdb; --blue2: #2d84f0; --blue-l: #e8f0fd; --blue-b: #c7dcfb;
            --teal: #0e9e7e; --teal-l: #e6f7f3; --amber: #d97706; --amber-l: #fef3c7;
            --red: #dc2626; --red-l: #fee2e2; --border: #d1dce9; --border2: #b8ccdf;
            --text: #1a2636; --text2: #4a647d; --text3: #8fa8be;
            --shadow: 0 1px 3px rgba(26, 111, 219, .08), 0 4px 16px rgba(26, 111, 219, .06);
            --shadow2: 0 2px 8px rgba(26, 111, 219, .12), 0 8px 32px rgba(26, 111, 219, .08);
            --music-bg: #fff;
        }

        [data-theme="dark"] {
            --bg: #050c14; --bg2: #0a1828; --bg3: #0e2038; --bg4: #122848;
            --blue: #3b9eff; --blue2: #60b4ff; --blue-l: rgba(59, 158, 255, .12); --blue-b: rgba(59, 158, 255, .25);
            --teal: #2dd4a4; --teal-l: rgba(45, 212, 164, .1); --amber: #fbbf24; --amber-l: rgba(251, 191, 36, .1);
            --red: #f87171; --red-l: rgba(248, 113, 113, .1); --border: rgba(59, 158, 255, .14); --border2: rgba(59, 158, 255, .28);
            --text: #cce8f4; --text2: #6aafcc; --text3: #2a5570;
            --shadow: 0 1px 3px rgba(0, 0, 0, .4), 0 4px 16px rgba(0, 0, 0, .3);
            --shadow2: 0 2px 8px rgba(0, 0, 0, .5), 0 8px 32px rgba(0, 0, 0, .4);
            --music-bg: #0a1828;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; transition: background .35s, color .35s }
        main { position: relative; z-index: 1; min-height: 100vh; padding: 48px 40px; display: flex; justify-content: center; align-items: flex-start }
        .wrapper { width: 100%; max-width: 1380px; display: flex; gap: 32px; align-items: flex-start }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; flex: 1; max-width: 640px; box-shadow: var(--shadow2); overflow: hidden; position: relative; }
        .card-top-bar { height: 4px; background: linear-gradient(90deg, var(--blue), var(--teal)) }
        .card-inner { padding: 40px 44px 44px }
        .floating-sidebar { flex: 0 0 460px; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; position: sticky; top: 48px; max-height: calc(100vh - 96px); overflow-y: auto; box-shadow: var(--shadow); }
        .sidebar-top-bar { height: 4px; background: linear-gradient(90deg, var(--teal), var(--blue)) }
        .sidebar-inner { padding: 32px }
        .logo-area { margin-bottom: 32px; text-align: center; padding-bottom: 28px; border-bottom: 1px solid var(--border) }
        .logo-title { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 5px; color: var(--text); text-transform: uppercase }
        .logo-title .hl { color: var(--blue) }
        .form-group { margin-bottom: 20px }
        label { display: block; font-size: .72rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .4px; text-transform: uppercase }
        select, input, textarea { width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
        .stack-list { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; max-height: 200px; overflow-y: auto; }
        .stack-item label { display: flex; align-items: center; padding: 7px 13px; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; font-size: .8rem; font-weight: 600; color: var(--text2); }
        .stack-item input:checked + label { background: var(--blue-l); border-color: var(--blue2); color: var(--blue); }
        .hidden { display: none !important }
        .btn-main { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blue2), var(--blue)); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        .info-msg { font-size: 0.8rem; color: var(--text3); font-family: 'Share Tech Mono', monospace; }
    </style>
</head>

<body>
    <main>
        <div class="wrapper">
            <div class="card">
                <div class="card-top-bar"></div>
                <div class="card-inner">
                    <div class="logo-area">
                        <h1 class="logo-title"><span class="hl">ANALYST</span> — NOC</h1>
                    </div>

                    <div class="form-group">
                        <label>Tipo de Acionamento</label>
                        <select id="tipoAcionamento">
                            <option value="">Selecione...</option>
                            <option value="MANUTENÇÃO">MANUTENÇÃO</option>
                            <option value="PREVENTIVA">PREVENTIVA</option>
                        </select>
                    </div>

                    <div class="form-group" id="boxSubcategoria">
                        <label>Subcategoria</label>
                        <select id="subcategoria"></select>
                    </div>

                    <div class="form-group">
                        <label>Empresa</label>
                        <select id="empresa">
                            <option value="">Selecione...</option>
                            <option value="CONNECT">CONNECT</option>
                            <option value="EXTRA SERVIÇOS">EXTRA SERVIÇOS</option>
                            <option value="PRÓPRIA">PRÓPRIA</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Prefixos das CTOs (Ex: ITA, JDE)</label>
                        <input type="text" id="buscaPrefixo" placeholder="Digite os prefixos separados por vírgula">
                    </div>

                    <div class="form-group">
                        <label>Técnicos Disponíveis</label>
                        <div id="listaTecs" class="stack-list">
                            <div class="info-msg">Selecione a empresa e prefixos.</div>
                        </div>
                    </div>

                    <button class="btn-main" id="btnGerar">Gerar Ordem de Serviço</button>
                </div>
            </div>

            <div class="floating-sidebar">
                <div class="sidebar-top-bar"></div>
                <div class="sidebar-inner">
                    <h2 style="font-family:'Bebas Neue'; letter-spacing:2px;">RESUMO</h2>
                    <div id="resumoOS" style="margin-top:20px; font-family:'Share Tech Mono'; font-size:0.9rem;">
                        Aguardando preenchimento...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Dados de exemplo para técnicos (Simulando vindo de uma planilha)
        const DB_TECNICOS = [
            { nome: "JESSE", empresa: "PRÓPRIA", prefixos: ["ITA", "JDE", "STN"] },
            { nome: "MARCOS", empresa: "CONNECT", prefixos: ["ITA"] },
            { nome: "PAULO", empresa: "EXTRA SERVIÇOS", prefixos: ["JDE"] },
            { nome: "RICARDO", empresa: "PRÓPRIA", prefixos: ["STN"] },
            { nome: "FELIPE", empresa: "CONNECT", prefixos: ["STN"] }
        ];

        const subcategorias = {
            "MANUTENÇÃO": ["ROMPIMENTO", "LENTIDÃO", "SEM SINAL"],
            "PREVENTIVA": ["CTO SEM TAMPA", "CTO DESFIXADA", "CTO COM TAMPA QUEBRADA", "CTO SEM SPLITTER", "CTO PEGOU FOGO", "HIGIENIZAÇÃO"]
        };

        const DOM = {
            tipo: document.getElementById('tipoAcionamento'),
            sub: document.getElementById('subcategoria'),
            empresa: document.getElementById('empresa'),
            prefixos: document.getElementById('buscaPrefixo'),
            listaTecs: document.getElementById('listaTecs'),
            resumo: document.getElementById('resumoOS')
        };

        // Atualiza subcategorias
        DOM.tipo.addEventListener('change', () => {
            const val = DOM.tipo.value;
            DOM.sub.innerHTML = '<option value="">Selecione...</option>';
            if (subcategorias[val]) {
                subcategorias[val].forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    DOM.sub.appendChild(opt);
                });
            }
            filtrarTecnicos();
        });

        DOM.sub.addEventListener('change', filtrarTecnicos);
        DOM.empresa.addEventListener('change', filtrarTecnicos);
        DOM.prefixos.addEventListener('input', filtrarTecnicos);

        function filtrarTecnicos() {
            const empresaSel = DOM.empresa.value;
            const subSel = DOM.sub.value;
            const prefixosDigitados = DOM.prefixos.value.toUpperCase().split(',').map(p => p.trim()).filter(p => p !== "");

            if (!empresaSel || prefixosDigitados.length === 0) {
                DOM.listaTecs.innerHTML = '<div class="info-msg">Selecione a empresa e prefixos das CTOs.</div>';
                return;
            }

            // Regra da Higienização
            if (subSel === "HIGIENIZAÇÃO") {
                renderizarTecnico("JESSE");
                return;
            }

            // Filtro Principal
            const filtrados = DB_TECNICOS.filter(tec => {
                // Filtra pela empresa
                if (tec.empresa !== empresaSel) return false;

                // Regra: Mostrar se o prefixo do técnico bater com algum selecionado
                const temPrefixo = tec.prefixos.some(p => prefixosDigitados.includes(p));
                
                // Se for CONNECT ou EXTRA, a regra do prefixo é obrigatória
                if (empresaSel === "CONNECT" || empresaSel === "EXTRA SERVIÇOS") {
                    return temPrefixo;
                }

                return temPrefixo;
            });

            if (filtrados.length === 0) {
                DOM.listaTecs.innerHTML = '<div class="info-msg">Nenhum técnico disponível para este prefixo/empresa.</div>';
            } else {
                DOM.listaTecs.innerHTML = '';
                filtrados.forEach(tec => renderizarTecnico(tec.nome));
            }
        }

        function renderizarTecnico(nome) {
            const div = document.createElement('div');
            div.className = 'stack-item';
            div.innerHTML = `
                <input type="radio" name="tecnico" id="tec_${nome}" value="${nome}" class="hidden">
                <label for="tec_${nome}">${nome}</label>
            `;
            DOM.listaTecs.appendChild(div);
        }

        document.getElementById('btnGerar').addEventListener('click', () => {
            const tecSel = document.querySelector('input[name="tecnico"]:checked');
            if (!tecSel) { alert("Selecione um técnico!"); return; }
            
            DOM.resumo.innerHTML = `
                <b>TIPO:</b> ${DOM.tipo.value}<br>
                <b>SUB:</b> ${DOM.sub.value}<br>
                <b>TÉCNICO:</b> ${tecSel.value}<br>
                <b>PREFIXOS:</b> ${DOM.prefixos.value.toUpperCase()}
            `;
        });
    </script>
</body>
</html>
