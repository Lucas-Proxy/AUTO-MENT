<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANALYST — NOC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        [data-theme="light"] {
            --bg: #eef2f7; --bg2: #fff; --bg3: #f5f8fc; --bg4: #e8f0fd;
            --blue: #1a6fdb; --blue2: #2d84f0; --blue-l: #e8f0fd; --blue-b: #c7dcfb;
            --teal: #0e9e7e; --teal-l: #e6f7f3; --amber: #d97706; --amber-l: #fef3c7;
            --red: #dc2626; --red-l: #fee2e2; --border: #d1dce9; --border2: #b8ccdf;
            --text: #1a2636; --text2: #4a647d; --text3: #8fa8be;
            --shadow: 0 1px 3px rgba(26, 111, 219, .08), 0 4px 16px rgba(26, 111, 219, .06);
            --shadow2: 0 2px 8px rgba(26, 111, 219, .12), 0 8px 32px rgba(26, 111, 219, .08);
        }

        [data-theme="dark"] {
            --bg: #050c14; --bg2: #0a1828; --bg3: #0e2038; --bg4: #122848;
            --blue: #3b9eff; --blue2: #60b4ff; --blue-l: rgba(59, 158, 255, .12); --blue-b: rgba(59, 158, 255, .25);
            --teal: #2dd4a4; --teal-l: rgba(45, 212, 164, .1); --amber: #fbbf24; --amber-l: rgba(251, 191, 36, .1);
            --red: #f87171; --red-l: rgba(248, 113, 113, .1); --border: rgba(59, 158, 255, .14); --border2: rgba(59, 158, 255, .28);
            --text: #cce8f4; --text2: #6aafcc; --text3: #2a5570;
            --shadow: 0 1px 3px rgba(0, 0, 0, .4), 0 4px 16px rgba(0, 0, 0, .3);
            --shadow2: 0 2px 8px rgba(0, 0, 0, .5), 0 8px 32px rgba(0, 0, 0, .4);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; transition: background .35s, color .35s }
        main { position: relative; z-index: 1; min-height: 100vh; padding: 48px 40px; display: flex; justify-content: center; align-items: flex-start }
        .wrapper { width: 100%; max-width: 1380px; display: flex; gap: 32px; align-items: flex-start; transition: max-width .4s cubic-bezier(0.16, 1, 0.3, 1) }
        .wrapper.metro-mode { max-width: 800px }
        
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; flex: 1; min-width: 0; box-shadow: var(--shadow2); overflow: hidden; position: relative; transition: all .4s cubic-bezier(0.16, 1, 0.3, 1) }
        .card-top-bar { height: 4px; background: linear-gradient(90deg, var(--blue), var(--teal)) }
        .card-inner { padding: 40px 44px 44px }
        
        .floating-sidebar { flex: 0 0 460px; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; position: sticky; top: 48px; max-height: calc(100vh - 96px); overflow-y: auto; box-shadow: var(--shadow); opacity: 0; transform: translateX(20px); transition: all .4s cubic-bezier(0.16, 1, 0.3, 1); display: none; }
        .floating-sidebar.visible { opacity: 1; transform: translateX(0); display: block; }
        .sidebar-top-bar { height: 4px; background: linear-gradient(90deg, var(--teal), var(--blue)) }
        .sidebar-inner { padding: 32px }
        
        .logo-area { margin-bottom: 32px; text-align: center; padding-bottom: 28px; border-bottom: 1px solid var(--border); position: relative }
        .logo-title { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; letter-spacing: 5px; color: var(--text); text-transform: uppercase }
        .logo-title .hl { color: var(--blue) }
        .theme-toggle { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: var(--bg3); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 600; transition: all .2s }
        .theme-toggle:hover { background: var(--blue-l); color: var(--blue); border-color: var(--blue2) }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px }
        .form-group { margin-bottom: 20px }
        label { display: block; font-size: .72rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .4px; text-transform: uppercase }
        
        select, input, textarea { width: 100%; padding: 10px 14px; font-family: 'Inter', sans-serif; font-size: .9rem; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; transition: all .2s }
        select:focus, input:focus, textarea:focus { border-color: var(--blue2); background: var(--bg2); box-shadow: 0 0 0 3px var(--blue-l) }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 24px }
        .btn-toggle { flex: 1; padding: 12px; text-align: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: .85rem; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; transition: all .2s }
        .btn-toggle.active { background: var(--blue-l); border-color: var(--blue2); color: var(--blue) }
        
        .stack-list { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; flex-wrap: wrap; gap: 6px; max-height: 200px; overflow-y: auto }
        .stack-item label { display: flex; align-items: center; padding: 7px 13px; margin: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; font-size: .8rem; font-weight: 600; color: var(--text2); transition: all .2s; user-select: none }
        .stack-item input:checked + label { background: var(--blue-l); border-color: var(--blue2); color: var(--blue) }
        .stack-item input { display: none }
        
        .info-msg { font-size: .8rem; color: var(--text3); font-style: italic; width: 100%; text-align: center; padding: 10px 0 }
        .hidden { display: none !important }
        
        .btn-main { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blue2), var(--blue)); color: #fff; border: none; border-radius: 8px; font-weight: 700; font-size: .95rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all .2s; margin-top: 10px; box-shadow: 0 4px 12px rgba(26, 111, 219, .2) }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(26, 111, 219, .3) }
        .btn-main:active { transform: translateY(1px) }
        
        .resumo-preview { font-family: 'Share Tech Mono', monospace; font-size: .9rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; word-break: break-word }
        .resumo-preview .lbl { color: var(--text3); display: inline-block; width: 80px }
        .resumo-preview .val { color: var(--blue); font-weight: bold }
        .resumo-preview .val-red { color: var(--red); font-weight: bold }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: var(--bg); padding: 12px 24px; border-radius: 8px; font-weight: 600; font-size: .9rem; opacity: 0; transition: all .3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; box-shadow: var(--shadow2) }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1 }

        .portas-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 8px }
        .porta-item { position: relative }
        .porta-item input { display: none }
        .porta-item label { display: flex; align-items: center; justify-content: center; width: 100%; aspect-ratio: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: .85rem; font-weight: 600; color: var(--text2); margin: 0; transition: all .2s }
        .porta-item input:checked + label { background: var(--red-l); border-color: var(--red); color: var(--red) }
        
        .cto-preview-item { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px }
        .cto-preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px }
        .cto-preview-title { font-weight: 700; color: var(--text); font-size: .9rem }
        .cto-preview-remove { color: var(--red); cursor: pointer; font-size: .8rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--red-l) }
        
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: .7rem; font-weight: 700; margin-left: 6px; vertical-align: middle }
        .badge-red { background: var(--red-l); color: var(--red) }
        .badge-amber { background: var(--amber-l); color: var(--amber) }
    </style>
</head>

<body>
    <main>
        <div class="wrapper" id="wrapper">
            <div class="card">
                <div class="card-top-bar"></div>
                <div class="card-inner">
                    <div class="logo-area">
                        <h1 class="logo-title"><span class="hl">ANALYST</span> — NOC</h1>
                        <button class="theme-toggle" id="btnTheme">Luz / Sombra</button>
                    </div>

                    <div class="btn-group">
                        <div class="btn-toggle active" id="btnRede">Rede (CTO/Cabo)</div>
                        <div class="btn-toggle" id="btnMetro">Metro (Switch/Rota)</div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Tipo de Acionamento</label>
                            <select id="tipoAcionamento">
                                <option value="">Selecione...</option>
                                <option value="INCIDENTE">INCIDENTE</option>
                                <option value="PROJETO">PROJETO</option>
                                <option value="EMERGÊNCIA">EMERGÊNCIA</option>
                                <option value="PREVENTIVA">PREVENTIVA</option>
                            </select>
                        </div>
                        <div class="form-group" id="boxSubcategoria">
                            <label>Subcategoria</label>
                            <select id="subcategoria">
                                <option value="">Aguardando Tipo...</option>
                            </select>
                        </div>
                    </div>

                    <div id="boxRede">
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Empresa</label>
                                <select id="empresa"><option value="">Carregando...</option></select>
                            </div>
                            <div class="form-group hidden" id="boxFamilia">
                                <label>Família (Ex: F1, F2)</label>
                                <input type="text" id="familia" placeholder="Ex: F1, F2">
                            </div>
                        </div>

                        <div class="form-group hidden" id="boxDetalheAtenuacao">
                            <label>Sinal Chegando na CTO (dBm)</label>
                            <input type="text" id="sinalCto" placeholder="Ex: -28.5">
                        </div>

                        <div class="form-group" id="boxBuscaCTO">
                            <label>Buscar CTO</label>
                            <input type="text" id="buscaCTO" placeholder="Digite para buscar CTOs..." autocomplete="off">
                            <div class="stack-list" id="listaCTOs" style="margin-top: 10px;">
                                <div class="info-msg">Selecione uma subcategoria.</div>
                            </div>
                        </div>

                        <div id="resumoCTOs" style="margin-bottom: 20px;"></div>

                        <div class="form-group hidden" id="boxPortas">
                            <label>Portas Afetadas na CTO Selecionada</label>
                            <div class="portas-grid" id="gridPortas"></div>
                        </div>

                        <div class="form-group" id="boxTecnicos">
                            <label>Técnicos Disponíveis</label>
                            <div class="stack-list" id="listaTecnicos">
                                <div class="info-msg">Selecione a empresa e CTOs.</div>
                            </div>
                        </div>
                        
                        <div class="form-group hidden" id="boxTecnicosCabo">
                            <label>Equipe Disponível (Cabistas)</label>
                            <div class="stack-list" id="listaTecnicosCabo">
                                <div class="info-msg">Selecione a empresa.</div>
                            </div>
                        </div>
                    </div>

                    <div id="boxMetro" class="hidden">
                        <div class="form-group">
                            <label>Equipamento / Rota</label>
                            <input type="text" id="equipamentoMetro" placeholder="Ex: SW-AGR-01 ou Rota JDE-ITA">
                        </div>
                        <div class="form-group">
                            <label>Empresa</label>
                            <select id="empresaMetro"><option value="">Carregando...</option></select>
                        </div>
                        <div class="form-group">
                            <label>Técnicos de Fibra/Metro</label>
                            <div class="stack-list" id="listaTecnicosMetro">
                                <div class="info-msg">Selecione a empresa.</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Detalhes / Observações</label>
                        <textarea id="observacoes" rows="3" placeholder="Informações adicionais relevantes..."></textarea>
                    </div>

                    <button class="btn-main" id="btnGerar">Gerar Resumo da O.S</button>
                </div>
            </div>

            <div class="floating-sidebar" id="sidebar">
                <div class="sidebar-top-bar"></div>
                <div class="sidebar-inner">
                    <h2 style="font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; color: var(--text); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center">
                        RESUMO O.S
                        <button id="btnCopiar" style="background: var(--blue-l); color: var(--blue); border: none; padding: 6px 12px; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: .8rem; font-weight: 600; cursor: pointer">COPIAR</button>
                    </h2>
                    <div id="previewText" class="resumo-preview">Preencha os dados e clique em Gerar.</div>
                    
                    <div id="previewRamal" class="hidden" style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border)">
                        <label>Técnico Selecionado</label>
                        <div id="ramalTecnico" style="font-family: 'Share Tech Mono'; font-size: 1.1rem; color: var(--blue); font-weight: bold; background: var(--bg3); padding: 12px; border-radius: 8px; border: 1px solid var(--border)"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">Copiado para a área de transferência!</div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6_9J9W1h5d9Wb8_2f3BXXdO4N-W34_2e4TzM6R2Lw1B9G88_1U4qQ3L9D8t2PqQ/exec';

        const subcategorias = {
            'INCIDENTE': ['ATENUAÇÃO', 'ROMPIMENTO', 'ANÁLISE DE PORTA', 'FALTA DE ENERGIA', 'VANDALISMO', 'INCÊNDIO'],
            'PROJETO': ['REMANEJAMENTO'],
            'EMERGÊNCIA': ['FIBRA NO CHÃO'],
            'PREVENTIVA': ['CTO SEM TAMPA', 'CTO DESFIXADA', 'CTO COM TAMPA QUEBRADA', 'CTO SEM SPLITTER', 'CTO PEGOU FOGO', 'HIGIENIZAÇÃO']
        };

        const DOM = {
            wrapper: document.getElementById('wrapper'),
            sidebar: document.getElementById('sidebar'),
            tipo: document.getElementById('tipoAcionamento'),
            sub: document.getElementById('subcategoria'),
            empresa: document.getElementById('empresa'),
            empresaMetro: document.getElementById('empresaMetro'),
            boxRede: document.getElementById('boxRede'),
            boxMetro: document.getElementById('boxMetro'),
            boxDetalheAtenuacao: document.getElementById('boxDetalheAtenuacao'),
            boxPortas: document.getElementById('boxPortas'),
            boxFamilia: document.getElementById('boxFamilia'),
            boxBuscaCTO: document.getElementById('boxBuscaCTO'),
            boxTecnicos: document.getElementById('boxTecnicos'),
            boxTecnicosCabo: document.getElementById('boxTecnicosCabo'),
            listaCTOs: document.getElementById('listaCTOs'),
            resumoCTOs: document.getElementById('resumoCTOs'),
            listaTecs: document.getElementById('listaTecnicos'),
            listaTecsCabo: document.getElementById('listaTecnicosCabo'),
            listaTecsMetro: document.getElementById('listaTecnicosMetro'),
            gridPortas: document.getElementById('gridPortas'),
            previewText: document.getElementById('previewText'),
            previewRamal: document.getElementById('previewRamal'),
            ramalTecnico: document.getElementById('ramalTecnico'),
            buscaCTO: document.getElementById('buscaCTO')
        };

        const AppState = {
            tecnicosData: [],
            empresasUnicas: [],
            ctosData: [],
            ctosSelecionadas: [], 
            portasAfetadas: {}, 
            tecnicosStatus: 'loading',
            ctosStatus: 'loading'
        };

        async function init() {
            carregarTema();
            configurarEventos();
            gerarGridPortas();
            
            Promise.all([fetchTecnicos(), fetchCTOs()]).then(() => {
                renderEmpresas(DOM.empresa);
                renderEmpresas(DOM.empresaMetro);
            });
        }

        async function fetchTecnicos() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getTecnicos`);
                const data = await res.json();
                AppState.tecnicosData = data;
                AppState.empresasUnicas = [...new Set(data.map(t => t.empresa))].filter(Boolean).sort();
                AppState.tecnicosStatus = 'success';
                updateTecnicosList();
            } catch (err) {
                AppState.tecnicosStatus = 'error';
                DOM.listaTecs.innerHTML = '<div class="info-msg" style="color:var(--red)">Erro ao carregar técnicos.</div>';
            }
        }

        async function fetchCTOs() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getCTOs`);
                const data = await res.json();
                AppState.ctosData = data;
                AppState.ctosStatus = 'success';
                DOM.listaCTOs.innerHTML = '<div class="info-msg">Digite para buscar CTOs...</div>';
            } catch (err) {
                AppState.ctosStatus = 'error';
                DOM.listaCTOs.innerHTML = '<div class="info-msg" style="color:var(--red)">Erro ao carregar CTOs.</div>';
            }
        }

        function renderEmpresas(selectEl) {
            selectEl.innerHTML = '<option value="">Selecione...</option>';
            AppState.empresasUnicas.forEach(emp => {
                selectEl.innerHTML += `<option value="${emp}">${emp}</option>`;
            });
        }

        function configurarEventos() {
            document.getElementById('btnTheme').addEventListener('click', () => {
                const html = document.documentElement;
                const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
                html.setAttribute('data-theme', newTheme);
                localStorage.setItem('noc_theme', newTheme);
            });

            document.getElementById('btnRede').addEventListener('click', () => switchTab('rede'));
            document.getElementById('btnMetro').addEventListener('click', () => switchTab('metro'));

            DOM.tipo.addEventListener('change', () => {
                const t = DOM.tipo.value;
                DOM.sub.innerHTML = '<option value="">Selecione...</option>';
                if (subcategorias[t]) {
                    subcategorias[t].forEach(s => DOM.sub.innerHTML += `<option value="${s}">${s}</option>`);
                }
                handleRules();
            });

            DOM.sub.addEventListener('change', handleRules);
            DOM.empresa.addEventListener('change', updateTecnicosList);
            DOM.empresaMetro.addEventListener('change', updateTecnicosMetroList);
            
            DOM.buscaCTO.addEventListener('input', (e) => {
                renderBuscaCTOs(e.target.value);
            });

            document.getElementById('btnGerar').addEventListener('click', gerarResumo);
            document.getElementById('btnCopiar').addEventListener('click', copiarResumo);
        }

        function carregarTema() {
            const saved = localStorage.getItem('noc_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        }

        function switchTab(tab) {
            document.getElementById('btnRede').classList.toggle('active', tab === 'rede');
            document.getElementById('btnMetro').classList.toggle('active', tab === 'metro');
            
            if (tab === 'rede') {
                DOM.boxMetro.classList.add('hidden');
                DOM.boxRede.classList.remove('hidden');
                DOM.wrapper.classList.remove('metro-mode');
            } else {
                DOM.boxRede.classList.add('hidden');
                DOM.boxMetro.classList.remove('hidden');
                DOM.wrapper.classList.add('metro-mode');
            }
        }

        function handleRules() {
            const t = DOM.tipo.value;
            const s = DOM.sub.value;

            DOM.boxDetalheAtenuacao.classList.add('hidden');
            DOM.boxPortas.classList.add('hidden');
            DOM.boxFamilia.classList.add('hidden');
            DOM.boxTecnicos.classList.add('hidden');
            DOM.boxTecnicosCabo.classList.add('hidden');
            DOM.boxBuscaCTO.classList.remove('hidden');

            const isCabo = t === 'PROJETO' || t === 'EMERGÊNCIA' || (t === 'INCIDENTE' && ['ROMPIMENTO', 'FALTA DE ENERGIA', 'VANDALISMO', 'INCÊNDIO'].includes(s));
            
            if (isCabo) {
                DOM.boxFamilia.classList.remove('hidden');
                DOM.boxTecnicosCabo.classList.remove('hidden');
            } else {
                DOM.boxTecnicos.classList.remove('hidden');
            }

            if (t === 'INCIDENTE' && s === 'ATENUAÇÃO') DOM.boxDetalheAtenuacao.classList.remove('hidden');
            if (t === 'INCIDENTE' && s === 'ANÁLISE DE PORTA') DOM.boxPortas.classList.remove('hidden');

            updateTecnicosList();
            renderResumoCTOs();
        }

        function gerarGridPortas() {
            DOM.gridPortas.innerHTML = '';
            for (let i = 1; i <= 16; i++) {
                DOM.gridPortas.innerHTML += `
                    <div class="porta-item">
                        <input type="checkbox" id="porta_${i}" value="${i}" onchange="updatePortas()">
                        <label for="porta_${i}">${i}</label>
                    </div>
                `;
            }
        }

        function updatePortas() {
            if (AppState.ctosSelecionadas.length !== 1) return;
            const ctoAtual = AppState.ctosSelecionadas[0];
            const selecionadas = [];
            for (let i = 1; i <= 16; i++) {
                if (document.getElementById(`porta_${i}`).checked) selecionadas.push(i);
            }
            AppState.portasAfetadas[ctoAtual] = selecionadas;
        }

        function renderBuscaCTOs(termo) {
            if (!termo || termo.length < 2) {
                DOM.listaCTOs.innerHTML = '<div class="info-msg">Digite pelo menos 2 caracteres...</div>';
                return;
            }

            if (AppState.ctosStatus !== 'success') return;

            const tUpper = termo.toUpperCase();
            const filtradas = AppState.ctosData.filter(c => c.nome.includes(tUpper)).slice(0, 15);

            DOM.listaCTOs.innerHTML = '';
            if (filtradas.length === 0) {
                DOM.listaCTOs.innerHTML = '<div class="info-msg">Nenhuma CTO encontrada.</div>';
                return;
            }

            filtradas.forEach(c => {
                const isSelected = AppState.ctosSelecionadas.includes(c.nome);
                const div = document.createElement('div');
                div.className = 'stack-item';
                div.innerHTML = `
                    <input type="checkbox" id="buscacto_${c.nome}" ${isSelected ? 'checked' : ''} onchange="toggleCTO('${c.nome}')">
                    <label for="buscacto_${c.nome}">${c.nome}</label>
                `;
                DOM.listaCTOs.appendChild(div);
            });
        }

        window.toggleCTO = function(nome) {
            const idx = AppState.ctosSelecionadas.indexOf(nome);
            if (idx > -1) {
                AppState.ctosSelecionadas.splice(idx, 1);
                delete AppState.portasAfetadas[nome];
            } else {
                AppState.ctosSelecionadas.push(nome);
                AppState.portasAfetadas[nome] = [];
            }

            if (DOM.sub.value === 'ANÁLISE DE PORTA') {
                if (AppState.ctosSelecionadas.length > 1) {
                    alert("Atenção: Selecione apenas 1 CTO por vez para Análise de Porta.");
                    AppState.ctosSelecionadas.pop();
                    delete AppState.portasAfetadas[nome];
                    document.getElementById(`buscacto_${nome}`).checked = false;
                } else if (AppState.ctosSelecionadas.length === 1) {
                    restaurarPortas(AppState.ctosSelecionadas[0]);
                } else {
                    desmarcarTudoPortas();
                }
            }
            
            renderResumoCTOs();
            updateTecnicosList();
        }

        function restaurarPortas(cto) {
            desmarcarTudoPortas();
            if (AppState.portasAfetadas[cto]) {
                AppState.portasAfetadas[cto].forEach(p => {
                    const el = document.getElementById(`porta_${p}`);
                    if (el) el.checked = true;
                });
            }
        }

        function desmarcarTudoPortas() {
            for (let i = 1; i <= 16; i++) {
                const el = document.getElementById(`porta_${i}`);
                if (el) el.checked = false;
            }
        }

        function renderResumoCTOs() {
            DOM.resumoCTOs.innerHTML = '';
            if (AppState.ctosSelecionadas.length === 0) {
                DOM.resumoCTOs.innerHTML = '<div class="info-msg">Nenhuma CTO selecionada.</div>';
                return;
            }

            AppState.ctosSelecionadas.forEach(cto => {
                let extraInfo = '';
                if (DOM.sub.value === 'ANÁLISE DE PORTA') {
                    const pts = AppState.portasAfetadas[cto] || [];
                    if (pts.length > 0) extraInfo = `<span class="badge badge-red">Portas: ${pts.join(', ')}</span>`;
                }

                DOM.resumoCTOs.innerHTML += `
                    <div class="cto-preview-item">
                        <div class="cto-preview-header">
                            <span class="cto-preview-title">${cto} ${extraInfo}</span>
                            <span class="cto-preview-remove" onclick="toggleCTO('${cto}'); renderBuscaCTOs(DOM.buscaCTO.value);">Remover</span>
                        </div>
                    </div>
                `;
            });
        }

        function updateTecnicosList() {
            if (AppState.tecnicosStatus !== 'success') return;
            
            const tipoSelected = DOM.tipo.value;
            const subSelected = DOM.sub.value;
            const empSelected = DOM.empresa.value;

            // 1. REGRA: HIGIENIZAÇÃO -> Somente Jesse (Independente da empresa)
            if (tipoSelected === 'PREVENTIVA' && subSelected === 'HIGIENIZAÇÃO') {
                DOM.boxTecnicosCabo.classList.add('hidden');
                DOM.boxTecnicos.classList.remove('hidden');
                
                const jesse = AppState.tecnicosData.find(t => t.nome.toUpperCase().includes('JESSE'));
                DOM.listaTecs.innerHTML = '';
                
                if (jesse) {
                    renderTecnico(jesse, DOM.listaTecs, 'tecRede');
                } else {
                    DOM.listaTecs.innerHTML = '<div class="info-msg">Técnico Jesse não encontrado na planilha.</div>';
                }
                return; 
            }

            // 2. Para os demais, precisa selecionar Empresa e CTO
            if (!empSelected) {
                DOM.listaTecs.innerHTML = '<div class="info-msg">Selecione a empresa.</div>';
                DOM.listaTecsCabo.innerHTML = '<div class="info-msg">Selecione a empresa.</div>';
                return;
            }

            if (AppState.ctosSelecionadas.length === 0) {
                DOM.listaTecs.innerHTML = '<div class="info-msg">Selecione ao menos uma CTO para filtrar por prefixo.</div>';
                DOM.listaTecsCabo.innerHTML = '<div class="info-msg">Selecione ao menos uma CTO para filtrar por prefixo.</div>';
                return;
            }

            // 3. Verifica Função (Reparador ou Cabista)
            const isCabista = tipoSelected === 'PROJETO' || tipoSelected === 'EMERGÊNCIA' || (tipoSelected === 'INCIDENTE' && ['ROMPIMENTO', 'FALTA DE ENERGIA', 'VANDALISMO', 'INCÊNDIO'].includes(subSelected));
            
            let filtrados = AppState.tecnicosData.filter(t => t.empresa === empSelected);
            
            if (isCabista) {
                filtrados = filtrados.filter(t => t.funcao && t.funcao.toUpperCase().includes('CABISTA'));
            } else {
                filtrados = filtrados.filter(t => t.funcao && t.funcao.toUpperCase().includes('REPARADOR'));
            }

            // 4. REGRA DE PREFIXOS OBRIGATÓRIOS
            // Pega os prefixos das CTOs selecionadas. Ex: ['JDE', 'ITA']
            const selectedPrefixes = [...new Set(AppState.ctosSelecionadas.map(cto => cto.split('-')[0].trim().toUpperCase()))];
            
            filtrados = filtrados.filter(t => {
                // Se for Connect ou Extra, o prefixo TEM que bater
                if (['CONNECT', 'EXTRA SERVIÇOS'].includes(t.empresa.toUpperCase())) {
                    if (!t.prefixos) return false;
                    const tecPrefixes = t.prefixos.toUpperCase().split(',').map(p => p.trim());
                    // Retorna verdadeiro se existir alguma interseção
                    return selectedPrefixes.some(p => tecPrefixes.includes(p));
                }
                // Para a Própria, também aplicamos o filtro se o técnico tiver prefixo cadastrado
                if (t.prefixos && t.prefixos.trim() !== '') {
                    const tecPrefixes = t.prefixos.toUpperCase().split(',').map(p => p.trim());
                    return selectedPrefixes.some(p => tecPrefixes.includes(p));
                }
                return true; 
            });

            // 5. Renderiza a lista correta
            const targetList = isCabista ? DOM.listaTecsCabo : DOM.listaTecs;
            targetList.innerHTML = '';
            
            if (filtrados.length === 0) {
                targetList.innerHTML = '<div class="info-msg">Nenhum técnico atende estes prefixos nesta empresa.</div>';
                return;
            }

            filtrados.forEach(t => renderTecnico(t, targetList, isCabista ? 'tecCabo' : 'tecRede'));
        }

        function updateTecnicosMetroList() {
            if (AppState.tecnicosStatus !== 'success') return;
            const empSelected = DOM.empresaMetro.value;
            if (!empSelected) {
                DOM.listaTecsMetro.innerHTML = '<div class="info-msg">Selecione a empresa.</div>';
                return;
            }

            const filtrados = AppState.tecnicosData.filter(t => t.empresa === empSelected && t.funcao && t.funcao.toUpperCase().includes('CABISTA'));
            DOM.listaTecsMetro.innerHTML = '';
            
            if (filtrados.length === 0) {
                DOM.listaTecsMetro.innerHTML = '<div class="info-msg">Nenhum técnico encontrado.</div>';
                return;
            }

            filtrados.forEach(t => renderTecnico(t, DOM.listaTecsMetro, 'tecMetro'));
        }

        function renderTecnico(tec, container, groupName) {
            const div = document.createElement('div');
            div.className = 'stack-item';
            div.innerHTML = `
                <input type="radio" name="${groupName}" id="${groupName}_${tec.nome}" value='${JSON.stringify(tec)}' onchange="mostrarRamal(this)">
                <label for="${groupName}_${tec.nome}">${tec.nome}</label>
            `;
            container.appendChild(div);
        }

        window.mostrarRamal = function(radioEl) {
            const tec = JSON.parse(radioEl.value);
            DOM.previewRamal.classList.remove('hidden');
            DOM.ramalTecnico.innerHTML = `${tec.nome} <span style="color:var(--text3);font-size:0.9rem">| Ramal:</span> ${tec.ramal || 'N/A'}`;
        }

        function gerarResumo() {
            const isRede = document.getElementById('btnRede').classList.contains('active');
            let res = '';

            const t = DOM.tipo.value;
            const s = DOM.sub.value;

            if (!t || !s) return alert("Selecione Tipo e Subcategoria.");

            if (isRede) {
                if (AppState.ctosSelecionadas.length === 0) return alert("Selecione pelo menos uma CTO.");
                const isCabo = t === 'PROJETO' || t === 'EMERGÊNCIA' || (t === 'INCIDENTE' && ['ROMPIMENTO', 'FALTA DE ENERGIA', 'VANDALISMO', 'INCÊNDIO'].includes(s));
                const radioName = isCabo ? 'tecCabo' : 'tecRede';
                const tecSelecionado = document.querySelector(`input[name="${radioName}"]:checked`);
                
                if (!tecSelecionado) return alert("Selecione um técnico/equipe.");
                const tec = JSON.parse(tecSelecionado.value);

                res += `<span class="lbl">TIPO:</span> <span class="val">${t}</span>\n`;
                res += `<span class="lbl">SUB:</span> <span class="val">${s}</span>\n`;
                
                if (isCabo) {
                    const fam = document.getElementById('familia').value || 'Não informado';
                    res += `<span class="lbl">FAMÍLIA:</span> <span class="val">${fam}</span>\n`;
                }

                if (t === 'INCIDENTE' && s === 'ATENUAÇÃO') {
                    const sinal = document.getElementById('sinalCto').value || 'N/A';
                    res += `<span class="lbl">SINAL CTO:</span> <span class="val-red">${sinal} dBm</span>\n`;
                }

                res += `\n<span class="lbl" style="width:100%">ELEMENTOS AFETADOS:</span>\n`;
                AppState.ctosSelecionadas.forEach(c => {
                    res += `  - <span class="val">${c}</span>\n`;
                    if (s === 'ANÁLISE DE PORTA' && AppState.portasAfetadas[c] && AppState.portasAfetadas[c].length > 0) {
                        res += `    <span class="val-red">↳ Portas: ${AppState.portasAfetadas[c].join(', ')}</span>\n`;
                    }
                });

                res += `\n<span class="lbl">EMPRESA:</span> <span class="val">${tec.empresa}</span>\n`;
                res += `<span class="lbl">TÉCNICO:</span> <span class="val">${tec.nome} (Ramal ${tec.ramal || 'N/A'})</span>\n`;
                
            } else {
                const equip = document.getElementById('equipamentoMetro').value;
                if (!equip) return alert("Informe o equipamento/rota.");
                const tecSelecionado = document.querySelector('input[name="tecMetro"]:checked');
                if (!tecSelecionado) return alert("Selecione um técnico.");
                const tec = JSON.parse(tecSelecionado.value);

                res += `<span class="lbl">TIPO:</span> <span class="val">${t}</span>\n`;
                res += `<span class="lbl">SUB:</span> <span class="val">${s}</span>\n`;
                res += `<span class="lbl">EQUIP/ROTA:</span> <span class="val">${equip}</span>\n`;
                res += `<span class="lbl">EMPRESA:</span> <span class="val">${tec.empresa}</span>\n`;
                res += `<span class="lbl">TÉCNICO:</span> <span class="val">${tec.nome} (Ramal ${tec.ramal || 'N/A'})</span>\n`;
            }

            const obs = document.getElementById('observacoes').value;
            if (obs) res += `\n<span class="lbl">OBS:</span> <span class="val">${obs}</span>`;

            DOM.previewText.innerHTML = res;
            DOM.sidebar.classList.add('visible');
        }

        function copiarResumo() {
            const rawText = DOM.previewText.innerText;
            if (rawText.includes("Preencha os dados")) return;
            
            navigator.clipboard.writeText(rawText).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
